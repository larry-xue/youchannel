app = "youchannel"
primary_region = "sjc"

[build]
  [build.args]
    VITE_SUPABASE_URL = "https://wzbiqlxovmxlatrgxzgc.supabase.co"

[env]
  NODE_ENV = "production"
  TZ = "UTC"

[processes]
  web = "node .output/server/index.mjs"

[http_service]
  internal_port = 3000
  force_https = true
  processes = ["web"]
  auto_start_machines = true
  auto_stop_machines = "suspend"
  min_machines_running = 0

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
