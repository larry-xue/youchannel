<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="0; url=https://larryxue.dev/blog/posts/youchannel-product-architecture-postmortem/" />
    <link rel="canonical" href="https://larryxue.dev/blog/posts/youchannel-product-architecture-postmortem/" />
    <title>YouChannel postmortem moved</title>
    <style>
      :root {
        color-scheme: light;
        --background: #f6f2e8;
        --foreground: #181511;
        --muted: #5f584f;
        --line: #ded3c4;
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        min-height: 100svh;
        place-items: center;
        margin: 0;
        background: var(--background);
        color: var(--foreground);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      main {
        width: min(42rem, calc(100% - 2rem));
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 1.5rem;
        background: #fffaf0;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.6rem, 4vw, 2.4rem);
        line-height: 1.04;
      }

      p {
        margin: 1rem 0 0;
        color: var(--muted);
        line-height: 1.65;
      }

      a {
        color: inherit;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>The YouChannel postmortem moved.</h1>
      <p>
        The canonical article now lives on
        <a href="https://larryxue.dev/blog/posts/youchannel-product-architecture-postmortem/">larryxue.dev</a>.
      </p>
    </main>
  </body>
</html>
